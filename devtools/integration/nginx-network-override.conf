location /app-assets/network/ {
    include /usr/share/unifi-core/http/cors.conf;
    include /usr/share/unifi-core/http/security.conf;
    include /usr/share/unifi-core/http/auth.conf;
    include /usr/share/unifi-core/http/proxy.conf;

    alias /usr/lib/unifi/webapps/ROOT/app-unifi/;

    expires max;
}

# Override: report ZONE_BASED_FIREWALL feature as existing
location ~ ^/proxy/network/v2/api/site/[^/]+/features/ZONE_BASED_FIREWALL.*/exists$ {
    include /usr/share/unifi-core/http/cors.conf;
    include /usr/share/unifi-core/http/security.conf;
    include /usr/share/unifi-core/http/auth.conf;

    default_type application/json;
    return 200 '{"feature_exists":true}';
}

# Override: serve static described-features with ZONE_BASED_FIREWALL injected.
# Generated by setup.sh step 4d — the real backend response plus zone features.
# Uses root+rewrite (alias doesn't work with regex locations in nginx).
# No auth.conf — static file, nothing for auth_request to validate against.
location ~ ^/proxy/network/v2/api/site/[^/]+/described-features$ {
    include /usr/share/unifi-core/http/cors.conf;
    include /usr/share/unifi-core/http/security.conf;

    default_type application/json;
    root /data/unifi-core/config/http;
    rewrite ^ /described-features.json break;
}

location /proxy/network/ {
    include /usr/share/unifi-core/http/cors.conf;
    include /usr/share/unifi-core/http/security.conf;
    include /usr/share/unifi-core/http/auth.conf;
    include /usr/share/unifi-core/http/proxy.conf;

    proxy_pass http://network_api_backend/;
}
location /proxy/network/public/ {
    include /usr/share/unifi-core/http/cors.conf;
    include /usr/share/unifi-core/http/security.conf;
    include /usr/share/unifi-core/http/proxy.conf;

    proxy_pass http://network_api_backend/public/;
}
